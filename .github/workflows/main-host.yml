name: Remote Host
on: [workflow_dispatch]

jobs:
  run-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Start Engine
        run: |
          # Launch your server script in the background
          node server.js & 
          
          # Wait for the proxy to initialize properly
          echo "Waiting for proxy to boot..."
          sleep 15
          
          # Connect the tunnel to the local IPv4 address to avoid connection refused errors
          npx cloudflared tunnel --url http://127.0.0.1:8080
